<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body{
            margin: 0px;
            overflow: hidden;
        }

        .main{
            width: 100%;
            height: 100vh;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            margin-top: 0px;
            overflow: hidden;
        }

        h1{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 32px;
            font-weight: 700;
            font-style: normal;
            padding: 10px 10px 0px;
            margin: 0px;
        }

        .all_header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 95%;
            margin-bottom: 20px;
            margin-top: 0px;
        }

        .profile_part {
            display: flex;
            align-items: center;
        }

        .fire {
            display: flex;
            align-items: flex-end;
            margin-right: 10px;
        }

        .profile_icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #ccc;
            border: 1px solid black;
        }

        .profile_icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .default-profile-picture {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .user_points {
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-left: 5px;
            color: #FD7981;
            line-height: 100%;
            letter-spacing: 0%;
        }

        .main_content {
            display: flex;
            overflow-y: auto;
        }

        .all_containers {
            width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            flex-wrap: wrap;
            padding-left: 5px;
            gap: 20px;
        }

        .container {
            position: relative;
            width: 240px;
            height: 140px;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
        }

        .container-title {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 15px;
            z-index: 2;
        }

        .container_svg {
            position: absolute;
            bottom: 12px;
            left: 12px;
            height: 110px;
        }

        .container_svg svg {
            width: 100%;
            height: 100%;
        }


        p {
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 120%;
            color: #2C2C2C;
            font-weight: bold;
            margin: 0px;
        }

        .doe_icon {
            display: none;
        }

        .nav_pc {
            display: none;
        }

        @media (min-width: 790px) {
            .doe_icon {
                display: block;
                margin-left: 47px;
            }

            h1 {
                font-size: 52px;
            }

            span.user_points {
                font-size: 20px;
            }

            .profile_icon {
                width: 70px;
                height: 70px;
            }

            .all_containers {
                gap: 20px;
                justify-content: start;
                margin-left: 50px;
            }

            .container {
                width: 300px;
                height: 176px;
            }

            .container_svg {
                height: 140px;
            }

            .nav_pannel {
                display: none !important;
            }

            .nav_pc {
                display: flex;
            }
        }

    </style>
</head>
