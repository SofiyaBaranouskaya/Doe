        body{
            margin: 0px;
            overflow-x: hidden;
        }

        h1{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 32px;
            font-weight: 700;
            font-style: normal;
            padding: 10px 10px 0px;
            margin: 0px;
        }

        h3{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin: -10px 0px 0px 10px;
        }

        p {
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 120%;
            color: #2C2C2C;
            font-weight: bold;
            margin: 0px;
        }

        .first_part {
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
          gap: 20px;
        }

        svg {
          display: block;
          height: auto;
          max-width: 100%;
        }

        .second_svg {
            margin: 20% 0px 20% -15%;
        }

        .third_svg {
            margin-top: 50%;
        }

        .main {
            margin: 0px auto;
            width: 90%;
        }

        a {
            text-decoration: none;
        }

        button {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            width: 300px;
            height: 50px;
            border: none;
            border-radius: 92px;
            background-color: #FD7981;
            color: white;
            margin: 50px auto 70px auto;
        }

        #nav_pannel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: -webkit-fill-available;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: white;
            margin: auto;
        }
    </style>
