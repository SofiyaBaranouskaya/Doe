        body{
            margin: 0px;
            overflow-x: hidden;
        }

        h1{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 32px;
            font-weight: 700;
            font-style: normal;
            padding: 10px 10px 0px;
            margin: 0px;
        }

        h3{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin: -10px 0px 0px 10px;
        }

        p {
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 120%;
            color: #2C2C2C;
            font-weight: bold;
            margin: 0px;
        }

        .first_part {
          display: flex;
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
          height: 300px;
          margin-top: -50px;
        }

        svg {
          display: block;
          height: auto;
          max-width: 100%;
        }

        .second_svg {
            margin: auto auto auto 0px;
        }

        .third_svg {
            margin-top: auto;
        }

        .all_content {
            display: flex;
            margin-top: -50px;
        }

        .main_content {
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0px auto;
        }

        #nav_pannel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: -webkit-fill-available;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: white;
            margin: auto;
        }

        .nav_pc {
            display: none;
        }

        @media (min-width: 790px) {
            h1 {
                font-size: 52px;
            }

            .nav_pannel {
                display: none !important;
            }

            .nav_pc {
                display: flex;
            }
        }
    </style>
