<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Glossary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body{
            margin: 0px;
            overflow: hidden;
        }

        .main{
            width: 100%;
            height: 100vh;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            margin-top: 0px;
            overflow: hidden;
        }

        h1{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 32px;
            font-weight: 700;
            font-style: normal;
            padding: 10px 10px 0px;
            margin: 0px;
        }

        .all_header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header{
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin-bottom: 20px;
            margin-top: 0px;
        }

        .search_filter_div{
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto auto 10px auto;
            position: relative;
        }

        .search_container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .search_field {
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #E0E0E0;
            border-radius: 30px;
            padding: 12px 40px 12px 20px; /* справа отступ под крестик */
            width: 280px;
            outline: none;
            color: #555;
            background: transparent;
        }

        .reset_search {
            position: absolute;
            right: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter {
            display:flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .filter p {
            font-size: 20px;
            color: gray;
            padding: 0 10px;
        }

        /* Hover эффект */
        .filter_variants p.selectable:hover {
            color: #FD7981;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Активный фильтр (после клика) */
        .filter_variants p.selectable.active {
            color: #FD7981;
            text-decoration: underline;
        }

        .filter_variants {
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .main_content {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .glossary_content {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .all_containers {
            width: 100%;
            height: auto;
            display: flex;
            flex-grow: 1;
            justify-content: center;
            overflow-x: hidden;
            flex-wrap: wrap;
            overflow-y: auto;
            padding-left: 5px;
            padding-top: 10px;
        }

        .container {
            width: 140px;
            height: 120px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        p {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 120%;
            color: #2C2C2C;
            font-weight: bold;
            margin: 0px;
        }

        .doe_icon {
            display: none;
        }

        .nav_pc {
            display: none;
        }

        .extra_header_name{
            display: none;
        }

        .container {
            perspective: 1000px;
            cursor: pointer;
            flex-shrink: 0;     /* Чтобы карточки не сжимались */
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            display: flex;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            display: block;
        }

        .card-back p {
            font-size: 18px;
            line-height: 1.4;
            margin: 0;
            padding: 10px;
            overflow-y: auto;
            overflow-x: hidden;
            word-wrap: break-word;
            height: 100%;
            box-sizing: border-box; /* padding учитывается в высоте */
            display: block;
        }

        /* Стилизация скролла (Chrome, Edge, Safari) */
        .card-back p::-webkit-scrollbar {
            width: 6px;
        }

        .card-back p::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.2);
            border-radius: 3px;
        }

        .card-back p::-webkit-scrollbar-track {
            background-color: transparent;
        }

        /* Для Firefox */
        .card-back p {
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.2) transparent;
        }

        .card-back {
            transform: rotateY(180deg);
            text-align: center;
        }

        .category-section {
            margin-bottom: 30px;
            width: 100%;
        }

        .category-header {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
            width: 100%;
        }

        .category-label {
            width: 240px;
            height: 41px;
            background-color: #FD7981;
            border-radius: 20.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-weight: 400;
            font-size: 16px;
            color: white;
            text-align: center;
            padding: 0 25px;
            box-sizing: border-box;
            /* Для обрезки длинного текста */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        @media (min-width: 790px) {
            .doe_icon {
                display: block;
                margin-left: 47px;
            }

            h1 {
                font-size: 52px;
            }

            p {
                font-size: 25px;
            }

            .extra_header_name{
                display: flex;
            }

            .all_containers {
                gap: 20px;
                justify-content: start;
                margin: 0 auto;
            }

            .container {
                width: 280px;
                height: 240px;
            }

            .search_filter_div{
                align-items: flex-end;
                margin-right: 90px;
            }

            .category-header {
                justify-content: flex-start;
            }

            .category-cards-wrapper {
                justify-content: flex-start;
                gap: 20px;
            }

            .nav_pannel {
                display: none !important;
            }

            .nav_pc {
                display: flex;
                margin-right: 100px;
            }
        }
    </style>
</head>
<body>
<div class="main">
    <div class="all_header">
        <div style="margin-top: 0px; margin-left: -70px; float: left">
            <svg width="260" height="63" viewBox="0 0 260 63" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="125.347" cy="123.959" rx="125.347" ry="123.959" transform="matrix(1 0 0 -1 0 50.02)" fill="#FD7981"/>
                <path d="M259.25 -61.8576C259.25 -129.896 203.474 -185.067 134.653 -185.067C65.8317 -185.067 10.0555 -129.896 10.0555 -61.8576C10.0555 6.18108 65.8317 61.3516 134.653 61.3516C203.474 61.3516 259.25 6.18108 259.25 -61.8576Z" stroke="#2C2C2C" stroke-width="1.5"/>
            </svg>
        </div>

        <div class="header">
            <svg width="137" height="99" viewBox="0 0 137 99" fill="none" xmlns="http://www.w3.org/2000/svg" class="doe_icon">
                <!-- SVG код остаётся без изменений -->
            </svg>
            <div style="width: -webkit-fill-available; display:flex; flex-direction: column; align-items: center;">
                <h1 style="height:50px;">Glossary</h1>
                <h1 class="extra_header_name">Easy Access to Common Terms</h1>
            </div>
        </div>
    </div>

    <div class="main_content">
        <div class="nav_pc">
            {% include 'videos/nav_pc.html' %}
        </div>

        <div class="glossary_content">
            <div class="search_filter_div">
                    <div class="search_container">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://.w3.org/2000/svg">
                            <path d="M19.6 21L13.3 14.7C12.8 15.1 12.225 15.4167 11.575 15.65C10.925 15.8833 10.2333 16 9.5 16C7.68333 16 6.14583 15.3708 4.8875 14.1125C3.62917 12.8542 3 11.3167 3 9.5C3 7.68333 3.62917 6.14583 4.8875 4.8875C6.14583 3.62917 7.68333 3 9.5 3C11.3167 3 12.8542 3.62917 14.1125 4.8875C15.3708 6.14583 16 7.68333 16 9.5C16 10.2333 15.8833 10.925 15.65 11.575C15.4167 12.225 15.1 12.8 14.7 13.3L21 19.6L19.6 21ZM9.5 14C10.75 14 11.8125 13.5625 12.6875 12.6875C13.5625 11.8125 14 10.75 14 9.5C14 8.25 13.5625 7.1875 12.6875 6.3125C11.8125 5.4375 10.75 5 9.5 5C8.25 5 7.1875 5.4375 6.3125 6.3125C5.4375 7.1875 5 8.25 5 9.5C5 10.75 5.4375 11.8125 6.3125 12.6875C7.1875 13.5625 8.25 14 9.5 14Z" fill="#1D1B20"/>
                        </svg>
                        <input type="text" placeholder="Search" class="search_field">
                        <svg class="reset_search" width="15" height="15" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5.09758 4.44626L8.78202 0.761819C8.85483 0.676796 8.89288 0.567429 8.88856 0.455573C8.88424 0.343717 8.83787 0.23761 8.75871 0.158457C8.67956 0.0793041 8.57346 0.0329339 8.4616 0.0286134C8.34974 0.0242929 8.24038 0.0623402 8.15535 0.135152L4.47091 3.8196L0.786464 0.130707C0.702773 0.0470169 0.589265 0 0.470908 0C0.352552 0 0.239043 0.0470169 0.155353 0.130707C0.0716621 0.214398 0.0246452 0.327907 0.0246452 0.446263C0.0246452 0.564619 0.0716621 0.678128 0.155353 0.761819L3.84424 4.44626L0.155353 8.13071C0.108827 8.17055 0.0710406 8.21958 0.0443636 8.27472C0.0176866 8.32986 0.00269542 8.38992 0.000331196 8.45113C-0.00203302 8.51234 0.00828052 8.57337 0.0306248 8.63041C0.052969 8.68744 0.0868616 8.73924 0.130175 8.78255C0.173488 8.82587 0.225287 8.85976 0.28232 8.8821C0.339354 8.90445 0.40039 8.91476 0.461599 8.9124C0.522807 8.91003 0.582866 8.89504 0.638006 8.86836C0.693146 8.84169 0.742176 8.8039 0.782019 8.75737L4.47091 5.07293L8.15535 8.75737C8.24038 8.83019 8.34974 8.86823 8.4616 8.86391C8.57346 8.85959 8.67956 8.81322 8.75871 8.73407C8.83787 8.65492 8.88424 8.54881 8.88856 8.43695C8.89288 8.3251 8.85483 8.21573 8.78202 8.13071L5.09758 4.44626Z" fill="black"/>
                        </svg>
                    </div>
                    <div class="filter">
                        <div style="display:flex;">
                            <p>Viewed</p>
                            <svg class="reset_filter" width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg" style="align-self: center; margin-top:-5px">
                                <path d="M5.09758 4.44626L8.78202 0.761819C8.85483 0.676796 8.89288 0.567429 8.88856 0.455573C8.88424 0.343717 8.83787 0.23761 8.75871 0.158457C8.67956 0.0793041 8.57346 0.0329339 8.4616 0.0286134C8.34974 0.0242929 8.24038 0.0623402 8.15535 0.135152L4.47091 3.8196L0.786464 0.130707C0.702773 0.0470169 0.589265 0 0.470908 0C0.352552 0 0.239043 0.0470169 0.155353 0.130707C0.0716621 0.214398 0.0246452 0.327907 0.0246452 0.446263C0.0246452 0.564619 0.0716621 0.678128 0.155353 0.761819L3.84424 4.44626L0.155353 8.13071C0.108827 8.17055 0.0710406 8.21958 0.0443636 8.27472C0.0176866 8.32986 0.00269542 8.38992 0.000331196 8.45113C-0.00203302 8.51234 0.00828052 8.57337 0.0306248 8.63041C0.052969 8.68744 0.0868616 8.73924 0.130175 8.78255C0.173488 8.82587 0.225287 8.85976 0.28232 8.8821C0.339354 8.90445 0.40039 8.91476 0.461599 8.9124C0.522807 8.91003 0.582866 8.89504 0.638006 8.86836C0.693146 8.84169 0.742176 8.8039 0.782019 8.75737L4.47091 5.07293L8.15535 8.75737C8.24038 8.83019 8.34974 8.86823 8.4616 8.86391C8.57346 8.85959 8.67956 8.81322 8.75871 8.73407C8.83787 8.65492 8.88424 8.54881 8.88856 8.43695C8.89288 8.3251 8.85483 8.21573 8.78202 8.13071L5.09758 4.44626Z" fill="gray" stroke="gray" stroke-width="1"/>
                            </svg>
                        </div>
                        <div class="filter_variants">
                            <p class="selectable">Alphabetically</p>
                            <p class="selectable">By Category</p>
                        </div>
                    </div>
                </div>
            <div class="all_containers">
                {% for item in items %}
                    <div class="container" data-category="{{ item.category }}">
                        <div class="card-inner">
                            <div class="card-front" style="background: {{ item.color }};">
                                <p>{{ item.term }}</p>
                            </div>
                            <div class="card-back" style="background: {{ item.color }};">
                                <p>{{ item.explanation }}</p>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="nav_pannel">
        {% include 'videos/nav.html' %}
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    /* ------------------------------
       Переменные
    ------------------------------ */
    const filters = document.querySelectorAll('.filter_variants p.selectable');
    const containersWrapper = document.querySelector('.all_containers');
    const originalOrder = Array.from(containersWrapper.children);
    const resetFilterButton = document.querySelector(".reset_filter");
    const searchInput = document.querySelector(".search_field");
    const resetSearchButton = document.querySelector(".reset_search");

    /* ------------------------------
       Функция для переворота карточек
    ------------------------------ */
    function attachCardFlipListeners() {
        document.querySelectorAll(".container").forEach(card => {
            const newCard = card.cloneNode(true);
            card.parentNode.replaceChild(newCard, card);
        });

        document.querySelectorAll(".container").forEach(card => {
            card.addEventListener("click", function() {
                const inner = this.querySelector(".card-inner");
                if (inner) inner.classList.toggle("flipped");
            });
        });
    }

    function attachCardFlipListenersV2() {
        containersWrapper.addEventListener('click', function(event) {
            const container = event.target.closest('.container');
            if (container) {
                const inner = container.querySelector('.card-inner');
                if (inner) inner.classList.toggle('flipped');
            }
        });
    }

    /* ------------------------------
       Центрирование текста на обратной стороне
    ------------------------------ */
    function adjustBackText() {
        document.querySelectorAll(".card-back p").forEach(p => {
            const parentHeight = p.parentElement.clientHeight;
            const scrollHeight = p.scrollHeight;

            if (scrollHeight > parentHeight) {
                p.style.display = "block";
                p.style.justifyContent = "";
                p.style.alignItems = "";
            } else {
                p.style.display = "flex";
                p.style.justifyContent = "center";
                p.style.alignItems = "center";
                p.style.flexDirection = "column";
            }
        });
    }

    /* ------------------------------
       Сортировка A–Z
    ------------------------------ */
    function sortAlphabetically() {
        const cards = Array.from(originalOrder);
        cards.sort((a, b) => {
            const aText = a.querySelector(".card-front p").textContent.trim().toLowerCase();
            const bText = b.querySelector(".card-front p").textContent.trim().toLowerCase();
            return aText.localeCompare(bText);
        });

        containersWrapper.innerHTML = "";
        cards.forEach(c => containersWrapper.appendChild(c.cloneNode(true)));

        adjustBackText();
        attachCardFlipListeners();
    }

    /* ------------------------------
       Сортировка по категориям
    ------------------------------ */
    function sortByCategory() {
        const cards = Array.from(originalOrder);
        const groups = {};

        cards.forEach(card => {
            const cat = card.dataset.category || "Uncategorized";
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(card.cloneNode(true));
        });

        containersWrapper.innerHTML = "";

        Object.keys(groups).sort().forEach(category => {
            const categorySection = document.createElement("div");
            categorySection.className = "category-section";

            const categoryHeader = document.createElement("div");
            categoryHeader.className = "category-header";

            const categoryLabel = document.createElement("div");
            categoryLabel.className = "category-label";
            categoryLabel.textContent = category;

            categoryHeader.appendChild(categoryLabel);
            categorySection.appendChild(categoryHeader);

            const cardsWrapper = document.createElement("div");
            cardsWrapper.className = "category-cards-wrapper";

            groups[category].forEach(card => {
                cardsWrapper.appendChild(card);
            });

            categorySection.appendChild(cardsWrapper);
            containersWrapper.appendChild(categorySection);
        });

        adjustBackText();
        attachCardFlipListeners();
    }

    /* ------------------------------
       Восстановление исходного порядка
    ------------------------------ */
    function restoreOriginalOrder() {
        containersWrapper.innerHTML = "";
        originalOrder.forEach(card => {
            containersWrapper.appendChild(card.cloneNode(true));
        });

        adjustBackText();
        attachCardFlipListeners();
    }

    /* ------------------------------
       Поиск по термину
    ------------------------------ */
    function filterByTerm(query) {
        query = query.trim().toLowerCase();
        if (!query) {
            restoreOriginalOrder();
            return;
        }
        const cards = containersWrapper.querySelectorAll(".container");
        cards.forEach(card => {
            const term = card.querySelector(".card-front p").textContent.toLowerCase();
            card.style.display = term.includes(query) ? "flex" : "none";
        });
    }

    if (searchInput) {
        searchInput.addEventListener("input", () => {
            filterByTerm(searchInput.value);
        });
    }

    if (resetSearchButton) {
        resetSearchButton.addEventListener("click", () => {
            searchInput.value = "";
            restoreOriginalOrder();
            searchInput.focus();
        });
    }

    /* ------------------------------
       Инициализация обработчиков
    ------------------------------ */
    function initEventListeners() {
        filters.forEach(f => {
            f.addEventListener("click", () => {
                filters.forEach(x => x.classList.remove("active"));
                f.classList.add("active");

                const mode = f.textContent.trim();
                if (mode === "Alphabetically") {
                    sortAlphabetically();
                } else if (mode === "By Category") {
                    sortByCategory();
                }
            });
        });

        if (resetFilterButton) {
            resetFilterButton.addEventListener("click", () => {
                filters.forEach(f => f.classList.remove("active"));
                restoreOriginalOrder();
            });
        }
    }

    /* ------------------------------
       Инициализация при загрузке
    ------------------------------ */
    function init() {
        attachCardFlipListeners();
        adjustBackText();
        initEventListeners();
        filters.forEach(f => f.classList.remove("active"));
        restoreOriginalOrder();
    }

    init();
});
</script>

</body>
</html>
