    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body{
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            padding: 0px;
            width: 100%;
            margin: 0px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: space-between;
        }

        .pictures {
            position: relative;
            width: 100%;
            height: 60vh;
        }

        .first_circle {
            position: absolute;
            top: 0;
            left: 0;
        }

        .person_pict {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .second_circle {
            position: absolute;
            top: 0;
            right: 0;
        }


        .text_bock {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: -30px 25px 0px;
        }

        h1{
            font-family: 'Baloo Bhaijaan 2', sans-serif;
            font-size: 32px;
            font-weight: bold;
            font-style: normal;
            line-height: 120%;
            margin: 0px;
        }

        p{
            margin: 0px;
        }

        .dots{
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        .switch_page{
            position: fixed;
            bottom: 0;
            right: 0;
            width: -webkit-fill-available;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-content: center;
            align-items: center;
            margin: 20px;
            z-index: 100;
        }

    </style>
</head>
